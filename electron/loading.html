<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TECH MART - Loading...</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: rgba(22, 27, 34, 0.8);
      --primary-color: #7c4dff;
      --secondary-color: #00e5ff;
      --text-color: #f0f6fc;
      --text-muted: #8b949e;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
      color: var(--text-color);
      -webkit-user-select: none;
      user-select: none;
    }

    .container {
      text-align: center;
      background: var(--card-bg);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 400px;
      width: 85%;
      position: relative;
    }

    .logo-container {
      margin-bottom: 25px;
      position: relative;
      display: inline-block;
    }

    .spinner {
      width: 70px;
      height: 70px;
      border: 3px solid rgba(124, 77, 255, 0.1);
      border-radius: 50%;
      border-top-color: var(--primary-color);
      border-bottom-color: var(--secondary-color);
      animation: spin 1.5s cubic-bezier(0.53, 0.21, 0.29, 0.67) infinite;
    }

    .logo-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 10px 0;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .app-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--secondary-color);
      margin-bottom: 20px;
      font-weight: 600;
    }

    .status-text {
      font-size: 14px;
      color: var(--text-muted);
      height: 20px;
      margin-top: 15px;
      transition: opacity 0.3s ease;
    }

    .progress-bar-container {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 25px;
    }

    .progress-bar {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
      border-radius: 2px;
      animation: loading-bar 2s infinite ease-in-out;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes loading-bar {
      0% {
        margin-left: -30%;
      }
      50% {
        margin-left: 100%;
      }
      100% {
        margin-left: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <div class="spinner"></div>
      <div class="logo-text">TM</div>
    </div>
    <h1>TECH MART</h1>
    <div class="app-title">Wholesale Management System</div>
    <div class="progress-bar-container">
      <div class="progress-bar"></div>
    </div>
    <div class="status-text" id="status">Connecting to server...</div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const statusMessages = [
      'Initializing Electron runtime...',
      'Connecting to local Database...',
      'Booting Tech Mart API Services...',
      'Synchronizing workspace data...',
      'Almost ready...'
    ];
    let msgIndex = 0;

    setInterval(() => {
      if (msgIndex < statusMessages.length - 1) {
        msgIndex++;
        statusEl.textContent = statusMessages[msgIndex];
      }
    }, 1500);
  </script>
</body>
</html>
